name: Deploy PlayPBNow

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_HOST: 64.227.108.128
  DEPLOY_USER: root

jobs:
  # STAGE 1: TEST & VALIDATE
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint --if-present || echo "⚠️  Linting issues found (non-blocking)"

      - name: Run TypeScript type checking
        run: npx tsc --noEmit || echo "⚠️  Type errors found (non-blocking)"

  # STAGE 2: BUILD WEB EXPORT
  build:
    name: Build Web Export
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web export
        run: |
          echo "Building Expo web app..."
          npx expo export --platform web
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist directory not created"
            exit 1
          fi
          echo "✅ Web build successful"
        env:
          CI: true

      - name: Prepare SPA structure
        run: |
          set -e
          echo "🔧 Preparing SPA structure..."

          # Copy index.html to app.html for SPA
          cp dist/index.html dist/app.html
          echo "✅ Created dist/app.html"

          # Fix Expo paths in both files
          node fix-expo-paths.js || echo "⚠️  No fix-expo-paths.js found (non-critical)"
          echo "✅ Fixed Expo paths"

          # Add base tag to app.html for subdirectory routing
          node add-base-tag.js || echo "⚠️  No add-base-tag.js found (non-critical)"
          echo "✅ Added base tag"

          # Create .htaccess for SPA fallback routing
          cat > dist/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /PlayPBNow/
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_URI} !index.html
            RewriteRule ^(.*)$ index.html [L]
          </IfModule>

          <IfModule mod_headers.c>
            Header set Cache-Control "public, max-age=3600" ".js" ".css" ".png" ".jpg" ".gif" ".svg" ".woff" ".woff2"
            Header set Cache-Control "public, max-age=0" "index.html"
          </IfModule>
          EOF
          echo "✅ Created .htaccess"

      - name: Verify build output
        run: |
          set -e
          test -f dist/index.html || (echo "❌ Landing page missing" && exit 1)
          test -f dist/app.html || (echo "❌ SPA app.html missing" && exit 1)
          test -f dist/.htaccess || (echo "❌ .htaccess missing" && exit 1)
          echo "✅ Build verification passed"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 5

  # STAGE 3: DEPLOY TO PRODUCTION
  deploy:
    name: Deploy to Production
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify SSH key is configured
        run: |
          if [ -z "${{ secrets.DO_SSH_PRIVATE_KEY }}" ]; then
            echo "❌ CRITICAL: DO_SSH_PRIVATE_KEY secret not configured!"
            echo "Please add SSH private key to GitHub Secrets:"
            echo "  1. Go to Settings → Secrets and variables → Actions"
            echo "  2. Click 'New repository secret'"
            echo "  3. Name: DO_SSH_PRIVATE_KEY"
            echo "  4. Value: (paste your SSH private key)"
            exit 1
          fi
          echo "✅ SSH key is configured"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config << EOF
          Host deploy
            HostName ${{ env.DEPLOY_HOST }}
            User ${{ env.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ConnectTimeout 10
          EOF
          echo "✅ SSH configured"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/

      - name: Create backup
        run: |
          echo "💾 Creating backup of current production..."
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOSH'
          set -e
          TIMESTAMP=$(date +%s)
          CURRENT="/var/www/html/PlayPBNow"
          BACKUP="/var/backups/PlayPBNow-backup-${TIMESTAMP}"

          if [ -d "$CURRENT" ]; then
            mkdir -p /var/backups
            cp -r "$CURRENT" "$BACKUP"
            echo "✅ Backup created: $BACKUP"
          else
            echo "ℹ️  No existing deployment to backup"
          fi
          EOSH

      - name: Deploy web files
        run: |
          echo "📦 Deploying web files to production..."
          rsync -avz --delete --include=".htaccess" \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/var/www/html/PlayPBNow/
          echo "✅ Web deployment complete"

      - name: Deploy API files
        run: |
          echo "📦 Deploying API files to production..."
          rsync -avz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='vendor' \
            --exclude='*.sql' \
            --exclude='*.bak' \
            --exclude='db_config.php' \
            --exclude='.DS_Store' \
            --exclude='tests' \
            -e "ssh -i ~/.ssh/deploy_key" \
            playpbnow-api/ \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/var/www/html/PlayPBNow/api/
          echo "✅ API deployment complete"

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment..."
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOSH'
          set -e

          echo "Checking deployed files..."
          test -f /var/www/html/PlayPBNow/index.html && echo "✅ Landing page deployed" || echo "❌ Landing page missing"
          test -f /var/www/html/PlayPBNow/app.html && echo "✅ SPA app deployed" || echo "❌ SPA app missing"
          test -f /var/www/html/PlayPBNow/.htaccess && echo "✅ Routing configured" || echo "❌ Routing missing"
          test -d /var/www/html/PlayPBNow/api && echo "✅ API deployed" || echo "❌ API missing"

          echo ""
          echo "Deployment verification complete!"
          EOSH

      - name: Deployment Success
        run: |
          echo "🎉 Deployment succeeded!"
          echo ""
          echo "URLs:"
          echo "  Landing: https://peoplestar.com/PlayPBNow/"
          echo "  App: https://peoplestar.com/PlayPBNow/app.html"
          echo "  API: https://peoplestar.com/PlayPBNow/api/"
