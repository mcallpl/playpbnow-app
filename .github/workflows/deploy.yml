name: Deploy PlayPBNow

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  DEPLOY_HOST: 64.227.108.128
  DEPLOY_USER: root

jobs:
  # STAGE 1: TEST & VALIDATE
  test:
    name: Test & Validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint --if-present || echo "⚠️  Linting issues found (non-blocking)"

      - name: Run TypeScript type checking
        run: npx tsc --noEmit || echo "⚠️  Type errors found (non-blocking)"

  # STAGE 2: BUILD WEB EXPORT
  build:
    name: Build Web Export
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build web export
        run: |
          echo "Building Expo web app..."
          npx expo export --platform web
          if [ ! -d "dist" ]; then
            echo "❌ Error: dist directory not created"
            exit 1
          fi
          echo "✅ Web build successful"
        env:
          CI: true

      - name: Prepare SPA structure
        run: |
          set -e
          echo "🔧 Preparing SPA structure..."

          # Copy index.html to app.html for SPA
          cp dist/index.html dist/app.html
          echo "✅ Created dist/app.html"

          # Copy landing page to index.html (replaces SPA as root)
          if [ -f public/landing.html ]; then
            cp public/landing.html dist/index.html
            echo "✅ Deployed landing page to dist/index.html"
          else
            echo "⚠️  Landing page not found, keeping SPA as root"
          fi

          # Copy assets folder to dist if it exists
          if [ -d public/images ]; then
            mkdir -p dist/images
            cp -r public/images/* dist/images/ 2>/dev/null || true
            echo "✅ Copied images to dist/"
          fi

          # Fix Expo paths in both files
          node fix-expo-paths.js || echo "⚠️  No fix-expo-paths.js found (non-critical)"
          echo "✅ Fixed Expo paths"

          # Add base tag to app.html for subdirectory routing
          node add-base-tag.js || echo "⚠️  No add-base-tag.js found (non-critical)"
          echo "✅ Added base tag"

          # Create .htaccess for SPA fallback routing (app lives at /PlayPBNow/)
          cat > dist/.htaccess << 'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /PlayPBNow/
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_URI} !index\.html$
            RewriteRule ^(.*)$ app.html [L]
          </IfModule>

          <IfModule mod_headers.c>
            <FilesMatch "\.(js|css|png|jpg|jpeg|gif|svg|woff|woff2)$">
              Header set Cache-Control "public, max-age=3600"
            </FilesMatch>
            <FilesMatch "\.html$">
              Header set Cache-Control "public, max-age=0"
            </FilesMatch>
          </IfModule>
          EOF
          echo "✅ Created .htaccess"

      - name: Verify build output
        run: |
          set -e
          test -f dist/index.html || (echo "❌ Landing page missing" && exit 1)
          test -f dist/app.html || (echo "❌ SPA app.html missing" && exit 1)
          test -f dist/.htaccess || (echo "❌ .htaccess missing" && exit 1)
          echo "✅ Build verification passed"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: dist/
          retention-days: 5

  # STAGE 3: DEPLOY TO PRODUCTION
  deploy:
    name: Deploy to Production
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify SSH key is configured
        run: |
          if [ -z "${{ secrets.DO_SSH_PRIVATE_KEY }}" ]; then
            echo "❌ CRITICAL: DO_SSH_PRIVATE_KEY secret not configured!"
            echo "Please add SSH private key to GitHub Secrets:"
            echo "  1. Go to Settings → Secrets and variables → Actions"
            echo "  2. Click 'New repository secret'"
            echo "  3. Name: DO_SSH_PRIVATE_KEY"
            echo "  4. Value: (paste your SSH private key)"
            exit 1
          fi
          echo "✅ SSH key is configured"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DO_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
          cat >> ~/.ssh/config << EOF
          Host deploy
            HostName ${{ env.DEPLOY_HOST }}
            User ${{ env.DEPLOY_USER }}
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            ConnectTimeout 10
          EOF
          echo "✅ SSH configured"

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: dist/

      - name: Clone API repository
        run: |
          echo "📦 Cloning PlayPBNow API repository..."
          if [ -d "playpbnow-api" ]; then
            rm -rf playpbnow-api
          fi
          git clone https://github.com/mcallpl/playpbnow-api.git
          echo "✅ API repository cloned"

      - name: Create backup
        run: |
          echo "💾 Creating backup of current production..."
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOSH'
          set -e
          TIMESTAMP=$(date +%s)
          CURRENT="/var/www/html/PlayPBNow"
          BACKUP="/var/backups/PlayPBNow-backup-${TIMESTAMP}"

          if [ -d "$CURRENT" ]; then
            mkdir -p /var/backups
            cp -r "$CURRENT" "$BACKUP"
            echo "✅ Backup created: $BACKUP"
          else
            echo "ℹ️  No existing deployment to backup"
          fi
          EOSH

      - name: Deploy web files
        run: |
          echo "📦 Deploying web files to production..."
          # CRITICAL: exclude live runtime dirs that aren't in dist/ so --delete
          # never wipes them:
          #   api      — the PHP backend (deployed separately below)
          #   reports  — user-generated match report images (shared-link targets;
          #              deleting these 404s every already-shared invite link)
          rsync -avz --delete --exclude='api' --exclude='reports' --include=".htaccess" \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/var/www/html/PlayPBNow/
          echo "✅ Web deployment complete"

      - name: Backup critical files on server
        run: |
          echo "💾 Backing up critical files..."
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOSH'
          mkdir -p /tmp/playbase_backup
          [ -f /var/www/html/PlayPBNow/api/db_config.php ] && cp /var/www/html/PlayPBNow/api/db_config.php /tmp/playbase_backup/
          [ -d /var/www/html/PlayPBNow/api/vendor ] && cp -r /var/www/html/PlayPBNow/api/vendor /tmp/playbase_backup/
          echo "✅ Critical files backed up"
          EOSH

      - name: Deploy API files
        run: |
          echo "📦 Deploying API files to production..."
          rsync -avz \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.sql' \
            --exclude='*.bak' \
            --exclude='db_config.php' \
            --exclude='vendor' \
            --exclude='.DS_Store' \
            --exclude='tests' \
            -e "ssh -i ~/.ssh/deploy_key" \
            playpbnow-api/ \
            ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:/var/www/html/PlayPBNow/api/
          echo "✅ API deployment complete"

      - name: Restore critical files on server
        run: |
          echo "🔐 Restoring critical files..."
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << 'EOSH'
          set -e
          API=/var/www/html/PlayPBNow/api
          # Primary: restore from this run's pre-deploy snapshot
          [ -f /tmp/playbase_backup/db_config.php ] && cp /tmp/playbase_backup/db_config.php "$API/"
          [ -d /tmp/playbase_backup/vendor ] && cp -r /tmp/playbase_backup/vendor "$API/"
          rm -rf /tmp/playbase_backup

          # HARD GUARD: db_config.php and vendor must NEVER be absent. If they are
          # (e.g. a prior bug wiped them), restore from the newest full site backup.
          if [ ! -f "$API/db_config.php" ] || [ ! -d "$API/vendor" ]; then
            echo "⚠️  Critical files missing after deploy — restoring from newest backup"
            NEWEST=$(ls -dt /var/backups/PlayPBNow-backup-*/ 2>/dev/null | head -1)
            if [ -n "$NEWEST" ]; then
              [ ! -f "$API/db_config.php" ] && [ -f "${NEWEST}api/db_config.php" ] && cp "${NEWEST}api/db_config.php" "$API/"
              [ ! -d "$API/vendor" ] && [ -d "${NEWEST}api/vendor" ] && cp -r "${NEWEST}api/vendor" "$API/"
              echo "✅ Restored from $NEWEST"
            fi
          fi
          chown -R 1001:1001 "$API/db_config.php" "$API/vendor" 2>/dev/null || true
          # Fail the deploy loudly if the backend is still not viable
          [ -f "$API/db_config.php" ] || { echo "❌ db_config.php STILL missing"; exit 1; }
          [ -f "$API/vendor/autoload.php" ] || { echo "❌ vendor/autoload.php STILL missing"; exit 1; }
          echo "✅ Critical files present"
          EOSH

      - name: Verify deployment
        run: |
          echo "🔍 Verifying deployment (live smoke tests)..."
          set -e
          # Canonical domain is https://playpbnow.com (bare URLs; its web root IS the
          # PlayPBNow dir). Legacy peoplestar.com/PlayPBNow/ now 301-redirects here, so
          # smoke tests target the canonical domain.
          # 1. API must return 200 (proves db_config + vendor present and DB reachable)
          API_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://playpbnow.com/api/get_courts.php)
          echo "API get_courts.php: HTTP $API_CODE"
          [ "$API_CODE" = "200" ] || { echo "❌ API not healthy"; exit 1; }
          # 2. Landing page must return 200
          LAND_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://playpbnow.com/)
          echo "Landing: HTTP $LAND_CODE"
          [ "$LAND_CODE" = "200" ] || { echo "❌ Landing not healthy"; exit 1; }
          # 3. The SPA's referenced JS bundle must actually exist (catches build/baseUrl
          #    regressions). Bare build → app.html references _expo/.../entry-<hash>.js
          #    (with a leading "/" or "./"); match either and probe it at the root.
          BUNDLE=$(curl -s https://playpbnow.com/app.html | grep -oE '_expo/[^"]*entry[^"]*\.js' | head -1)
          echo "Bundle path: $BUNDLE"
          [ -n "$BUNDLE" ] || { echo "❌ app.html bundle path missing (build regression)"; exit 1; }
          BUNDLE_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://playpbnow.com/${BUNDLE}")
          echo "Bundle: HTTP $BUNDLE_CODE"
          [ "$BUNDLE_CODE" = "200" ] || { echo "❌ JS bundle 404 — blank screen"; exit 1; }
          echo "✅ All live smoke tests passed!"

      - name: Deployment Success
        run: |
          echo "🎉 Deployment succeeded!"
          echo ""
          echo "URLs:"
          echo "  Landing: https://playpbnow.com/"
          echo "  App: https://playpbnow.com/app.html (bare routes, e.g. /login)"
          echo "  API: https://playpbnow.com/api/"
