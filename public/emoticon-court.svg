<svg viewBox="0 0 140 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="courtShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Court base -->
  <rect x="15" y="15" width="110" height="70" rx="4" fill="rgba(135,202,55,0.15)" stroke="#87ca37" stroke-width="2" filter="url(#courtShadow)"/>

  <!-- Center line -->
  <line x1="70" y1="15" x2="70" y2="85" stroke="#87ca37" stroke-width="1.5" opacity="0.6"/>

  <!-- Service boxes -->
  <rect x="15" y="35" width="55" height="30" fill="none" stroke="#87ca37" stroke-width="1" opacity="0.4"/>
  <rect x="70" y="35" width="55" height="30" fill="none" stroke="#87ca37" stroke-width="1" opacity="0.4"/>

  <!-- Kitchen line (non-volley zone) -->
  <line x1="15" y1="45" x2="125" y2="45" stroke="#87ca37" stroke-width="1" stroke-dasharray="3,2" opacity="0.5"/>

  <!-- Net -->
  <line x1="70" y1="38" x2="70" y2="52" stroke="#87ca37" stroke-width="2.5" opacity="0.8"/>
  <circle cx="70" cy="45" r="2" fill="#87ca37" opacity="0.8"/>
</svg>
