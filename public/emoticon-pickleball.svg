<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87ca37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9dd957;stop-opacity:1" />
    </linearGradient>
    <filter id="pbShadow">
      <feDropShadow dx="0" dy="3" stdDeviation="2" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Main ball -->
  <circle cx="60" cy="60" r="52" fill="url(#pbGrad)" filter="url(#pbShadow)"/>

  <!-- Highlight -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#fff" stroke-width="2" opacity="0.4"/>

  <!-- Pickleball characteristic holes pattern -->
  <g opacity="0.5" fill="rgba(15,27,45,0.7)">
    <!-- Top row -->
    <circle cx="45" cy="35" r="3"/>
    <circle cx="60" cy="32" r="3"/>
    <circle cx="75" cy="35" r="3"/>

    <!-- Middle row -->
    <circle cx="38" cy="52" r="3"/>
    <circle cx="60" cy="50" r="3"/>
    <circle cx="82" cy="52" r="3"/>

    <!-- Bottom row -->
    <circle cx="45" cy="85" r="3"/>
    <circle cx="60" cy="88" r="3"/>
    <circle cx="75" cy="85" r="3"/>
  </g>

  <!-- Accent ring -->
  <circle cx="60" cy="60" r="52" fill="none" stroke="#87ca37" stroke-width="1.5" opacity="0.6"/>
</svg>
