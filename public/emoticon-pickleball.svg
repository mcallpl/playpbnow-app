<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#87ca37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7eba2e;stop-opacity:1" />
    </linearGradient>
    <filter id="pbShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Main ball -->
  <circle cx="60" cy="60" r="50" fill="url(#pbGrad)" filter="url(#pbShadow)"/>

  <!-- Highlight for depth -->
  <ellipse cx="45" cy="45" rx="18" ry="18" fill="#fff" opacity="0.25" />

  <!-- Pickleball PERFORATIONS - distinctive holes ALL OVER -->
  <g opacity="0.6" fill="rgba(15,27,45,0.8)">
    <!-- Top section -->
    <circle cx="40" cy="30" r="2.5"/>
    <circle cx="60" cy="26" r="2.5"/>
    <circle cx="80" cy="30" r="2.5"/>

    <!-- Upper middle -->
    <circle cx="30" cy="45" r="2.5"/>
    <circle cx="50" cy="42" r="2.5"/>
    <circle cx="70" cy="40" r="2.5"/>
    <circle cx="90" cy="45" r="2.5"/>

    <!-- Center band -->
    <circle cx="25" cy="60" r="2.5"/>
    <circle cx="42" cy="58" r="2.5"/>
    <circle cx="60" cy="56" r="2.5"/>
    <circle cx="78" cy="58" r="2.5"/>
    <circle cx="95" cy="60" r="2.5"/>

    <!-- Lower middle -->
    <circle cx="30" cy="75" r="2.5"/>
    <circle cx="50" cy="78" r="2.5"/>
    <circle cx="70" cy="80" r="2.5"/>
    <circle cx="90" cy="75" r="2.5"/>

    <!-- Bottom section -->
    <circle cx="40" cy="90" r="2.5"/>
    <circle cx="60" cy="94" r="2.5"/>
    <circle cx="80" cy="90" r="2.5"/>
  </g>

  <!-- Outer ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="#87ca37" stroke-width="1.5" opacity="0.7"/>

  <!-- Inner accent -->
  <circle cx="60" cy="60" r="48" fill="none" stroke="#fff" stroke-width="0.5" opacity="0.2"/>
</svg>
