<!DOCTYPE html><html><head><meta charset="utf-8"><style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1024px;height:500px;overflow:hidden}
  .g{width:1024px;height:500px;position:relative;
     background:radial-gradient(1200px 700px at 78% 18%, #123a2a 0%, #0f1b2d 42%, #0b1626 100%);
     font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;overflow:hidden}
  /* faint court lines */
  .court{position:absolute;inset:0;opacity:.10}
  .court:before,.court:after{content:"";position:absolute;background:#b6f24a}
  .court:before{left:6%;right:6%;top:50%;height:3px;transform:translateY(-50%)}
  .court:after{left:50%;top:8%;bottom:8%;width:3px;transform:translateX(-50%)}
  .net{position:absolute;left:50%;top:8%;bottom:8%;width:2px;transform:translateX(-50%);
       background:repeating-linear-gradient(#eaff62 0 6px,transparent 6px 12px);opacity:.10}
  .left{position:absolute;left:60px;top:0;bottom:0;width:560px;display:flex;flex-direction:column;justify-content:center}
  .logo{height:74px;margin-bottom:26px}
  .logo img{height:100%}
  h1{font-size:64px;line-height:1.02;font-weight:800;color:#fff;letter-spacing:-1.5px}
  h1 .now{color:#c7ef3c}
  .tag{font-size:30px;font-weight:700;color:#eaff62;margin-top:14px}
  .sub{font-size:20px;font-weight:600;color:#9fb3c8;margin-top:16px;letter-spacing:.2px}
  .dot{color:#129351;padding:0 8px}
  /* pickleball on right */
  .ball{position:absolute;right:120px;top:50%;transform:translateY(-50%);
        width:280px;height:280px;border-radius:50%;
        background:radial-gradient(circle at 34% 30%, #f4ff9e 0%, #eaff62 34%, #c7ef3c 70%, #9ad72f 100%);
        box-shadow:0 30px 80px rgba(198,239,60,.28), inset -18px -20px 44px rgba(120,160,20,.35)}
  .hole{position:absolute;width:26px;height:26px;border-radius:50%;background:#0f1b2d;opacity:.82}
  .paddle{position:absolute;right:70px;bottom:36px;width:150px;height:150px;
          background:linear-gradient(135deg,#129351,#0c6c3b);border-radius:36px 36px 30px 30px;
          transform:rotate(28deg);box-shadow:0 20px 50px rgba(18,147,81,.4)}
  .paddle:after{content:"";position:absolute;left:50%;bottom:-46px;transform:translateX(-50%);
          width:26px;height:60px;background:#0c6c3b;border-radius:0 0 8px 8px}
</style></head>
